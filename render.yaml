services:
  - type: web
    name: xlsxworld-backend
    env: docker
    plan: free
    dockerfilePath: server/Dockerfile
    buildCommand: ""
    startCommand: "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'"
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
    healthCheckPath: "/health"
    branch: main
    autoDeploy: true
